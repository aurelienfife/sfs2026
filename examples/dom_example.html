<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document example</title>
</head>
<body>
    
    <script>
        function changeCaption() {
            document.getElementById("content").innerHTML = "You've been PWNED!";
        }
    </script>

    <h1>This is a site</h1>

    <p id="content">Hello World</p>

    <button onclick="changeCaption()">Click here</button>

</body>
</html>
